/span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br></pre></td><td class="code"><pre><span class="line">https://github.com/tsycnh/mlbasic/blob/master/p1%20gradient%20descent.py</span><br><span class="line"></span><br><span class="line"># -*- coding: utf-8 -*-</span><br><span class="line">&quot;&quot;&quot;</span><br><span class="line">@Time : 2021/7/4 7:17 下午</span><br><span class="line">@Author : Dufy</span><br><span class="line">@Email : 813540660@qq.com</span><br><span class="line">@File : optimization.py</span><br><span class="line">@Software: PyCharm </span><br><span class="line">Description :</span><br><span class="line">1) 机器学习各种优化方法学习比较</span><br><span class="line">2)       </span><br><span class="line">&quot;&quot;&quot;</span><br><span class="line"></span><br><span class="line"># from config import logger</span><br><span class="line">import traceback</span><br><span class="line">import numpy as np</span><br><span class="line">import matplotlib.pyplot as plt</span><br><span class="line">from mpl_toolkits.mplot3d import Axes3D</span><br><span class="line"></span><br><span class="line">plt.rcParams[&apos;font.sans-serif&apos;] = [&apos;SimHei&apos;]  # 用来正常显示中文标签</span><br><span class="line">plt.rcParams[&apos;axes.unicode_minus&apos;] = False  # 用来正常显示负号</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">class Draw:</span><br><span class="line">    def __init__(self):</span><br><span class="line">        self.fig = plt.figure(1, figsize=(12, 8))</span><br><span class="line"></span><br><span class="line">    def draw_hill(self, x, y, optimizer):</span><br><span class="line">        a = np.linspace(-20, 20, 100)</span><br><span class="line">        b = np.linspace(-20, 20, 100)</span><br><span class="line">        x = np.array(x)</span><br><span class="line">        y = np.array(y)</span><br><span class="line"></span><br><span class="line">        allSSE = np.zeros(shape=(len(a), len(b)))</span><br><span class="line">        for ai in range(0, len(a)):</span><br><span class="line">            for bi in range(0, len(b)):</span><br><span class="line">                a0 = a[ai]</span><br><span class="line">                b0 = b[bi]</span><br><span class="line">                SSE = optimizer.calc_loss(a0,b0,x,y)</span><br><span class="line">                allSSE[ai][bi] = SSE</span><br><span class="line">        a, b = np.meshgrid(a, b)</span><br><span class="line">        return [a, b, allSSE]</span><br><span class="line"></span><br><span class="line">    # def draw_mesh(self,loss, para):</span><br><span class="line">    #     # 绘制图1的曲面</span><br><span class="line">    #     ax = self.fig.add_subplot(2, 2, 1, projection=&apos;3d&apos;)</span><br><span class="line">    #     ax.set_top_view()</span><br><span class="line">    #     # ax.plot_surface(para[0], para[1], hallSSE, rstride=2, cstride=2, cmap=&apos;rainbow&apos;)</span><br><span class="line">    #     # 绘制图1中的loss点</span><br><span class="line">    #     ax.scatter(para[0], para[1], loss, color=&apos;black&apos;)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">class Optimizer:</span><br><span class="line">    def __init__(self):</span><br><span class="line">        self.a = 10</span><br><span class="line">        self.b = -20</span><br><span class="line">        self.rate=0.2</span><br><span class="line"></span><br><span class="line">    def run(self, x, y):</span><br><span class="line">        &quot;&quot;&quot;</span><br><span class="line">        计算损失函数，Loss = (y_-y)^2/(2n)</span><br><span class="line">        :param x:</span><br><span class="line">        :param y: 真实值</span><br><span class="line">        :return: loss：当前损失； para: 当前参数 a,b</span><br><span class="line">        &quot;&quot;&quot;</span><br><span class="line">        # print((self.a, self.b), &apos;...&apos;)</span><br><span class="line">        loss = self.calc_loss(self.a, self.b, x, y)</span><br><span class="line">        para = (self.a, self.b)</span><br><span class="line">        self.update_para(x,y)</span><br><span class="line">        return loss, para</span><br><span class="line"></span><br><span class="line">    def calc_loss(self, a,b,x,y):</span><br><span class="line">        y_ = a * x + b</span><br><span class="line">        tmp = (y_ - y) ** 2</span><br><span class="line">        loss = sum(tmp) / (2 * len(x))</span><br><span class="line">        return loss</span><br><span class="line"></span><br><span class="line">    def update_para(self, x, y):</span><br><span class="line">        &quot;&quot;&quot;</span><br><span class="line">        更新a,b</span><br><span class="line">        :param x:</span><br><span class="line">        :param y:</span><br><span class="line">        :param y_: 预测值</span><br><span class="line">        :return:</span><br><span class="line">        &quot;&quot;&quot;</span><br><span class="line">        pass</span><br><span class="line">        y_ = self.a * x + self.b</span><br><span class="line">        self.a -= self.rate*sum((y_-y)*x)/len(x)</span><br><span class="line">        self.b -= self.rate*sum(y_-y)/len(x)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">if __name__ == &quot;__main__&quot;:</span><br><span class="line">    pass</span><br><span class="line">    x = np.array([30, 35, 37, 59, 70, 76, 88, 100]).astype(np.float32)</span><br><span class="line">    y = np.array([1100, 1423, 1377, 1800, 2304, 2588, 3495, 4839]).astype(np.float32)</span><br><span class="line">    x_max = max(x)</span><br><span class="line">    x_min = min(x)</span><br><span class="line">    y_max = max(y)</span><br><span class="line">    y_min = min(y)</span><br><span class="line">    for i in range(0, len(x)):  # 0-1归一化</span><br><span class="line">        x[i] = (x[i] - x_min) / (x_max - x_min)</span><br><span class="line">        y[i] = (y[i] - y_min) / (y_max - y_min)</span><br><span class="line">    print(x, y, sep=&apos;\n&apos;)</span><br><span class="line">    # plt.plot(x,y,&apos;-o&apos;)</span><br><span class="line">    # plt.show()</span><br><span class="line"></span><br><span class="line">    optimizer = Optimizer()</span><br><span class="line">    draw = Draw()</span><br><span class="line">    [ha, hb, hallSSE] = draw.draw_hill(x, y, optimizer)</span><br><span class="line">    hallSSE = hallSSE.T  # 重要，将所有的losses做一个转置。原因是矩阵是以左上角至右下角顺序排列元素，而绘图是以左下角为原点。</span><br><span class="line">    fig = plt.figure(1, figsize=(12, 8))</span><br><span class="line">    # 绘制图1的曲面</span><br><span class="line">    ax = fig.add_subplot(2, 2, 1, projection=&apos;3d&apos;)</span><br><span class="line">    ax.set_top_view()</span><br><span class="line">    ax.plot_surface(ha, hb, hallSSE, rstride=2, cstride=2, cmap=&apos;rainbow&apos;)</span><br><span class="line"></span><br><span class="line">    for step in range(100):</span><br><span class="line">        # print(optimizer.calc_loss(x,y))</span><br><span class="line">        loss, para = optimizer.run(x,y)</span><br><span class="line"></span><br><span class="line">        # 绘制图1中的loss点</span><br><span class="line">        ax.scatter(para[0], para[1], loss, color=&apos;black&apos;)</span><br><span class="line"></span><br><span class="line">        if step % 1 == 0:</span><br><span class="line">            print(&quot;step: &quot;, step, &quot; loss: &quot;, loss)</span><br><span class="line">            plt.show()</span><br><span class="line">            plt.pause(0.01)</span><br><span class="line"></span><br><span class="line">    plt.show()</span><br><span class="line">    plt.pause(99999999999)</span><br></pre></td></tr></table></figure>
